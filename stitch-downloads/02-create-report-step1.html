<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom scrollbar for textarea */
        textarea::-webkit-scrollbar {
            width: 6px;
        }
        textarea::-webkit-scrollbar-track {
            background: transparent;
        }
        textarea::-webkit-scrollbar-thumb {
            background-color: #c5c5d3;
            border-radius: 10px;
        }

    body {

<style>

<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md antialiased pb-24 md:pb-0">
<!-- Header: Transactional/Flow Header (Suppresses default Nav Shells per rule) -->
<header class="sticky top-0 left-0 w-full z-50 bg-surface shadow-sm border-b border-outline-variant/30 px-margin-mobile md:px-margin-desktop h-16 flex items-center justify-between">
<button aria-label="Kembali" class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface flex-1 text-center truncate px-4">Buat Laporan Baru</h1>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-2xl mx-auto px-margin-mobile md:px-0 py-6 md:py-8 flex flex-col gap-6">
<!-- Step Indicator -->
<section class="flex flex-col gap-2">
<div class="flex items-center justify-between font-label-sm text-label-sm">
<span class="text-primary font-semibold">Langkah 1 dari 3</span>
<span class="text-on-surface-variant">Verifikasi</span>
</div>
<div class="flex gap-2">
<div class="h-2 flex-1 rounded-full bg-primary transition-all duration-300"></div>
<div class="h-2 flex-1 rounded-full bg-surface-variant transition-all duration-300"></div>
<div class="h-2 flex-1 rounded-full bg-surface-variant transition-all duration-300"></div>
</div>
</section>
<!-- Form Card (Level 1 Elevation) -->
<div class="bg-surface rounded-xl shadow-sm border border-outline-variant p-5 md:p-8 flex flex-col gap-6">
<!-- Context Text -->
<div class="flex gap-3 p-4 bg-surface-container-low rounded-lg border border-primary-fixed">
<span class="material-symbols-outlined text-primary mt-0.5" style="font-variation-settings: 'FILL' 1;">info</span>
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Pastikan data diri dan kategori laporan sesuai untuk mempercepat proses verifikasi oleh instansi terkait.
                </p>
</div>
<form class="flex flex-col gap-5">
<!-- NIK Field (Validated) -->
<div class="flex flex-col gap-1.5">
<label class="font-label-sm text-label-sm text-on-surface flex justify-between items-center" for="nik">
                        Nomor Induk Kependudukan (NIK)
                        <span class="text-tertiary-container flex items-center gap-1 bg-tertiary-fixed/30 px-2 py-0.5 rounded text-[10px] uppercase tracking-wider">
<span class="material-symbols-outlined text-[14px]">check_circle</span> Terverifikasi
                        </span>
</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface-variant tracking-widest cursor-not-allowed outline-none focus:ring-0" disabled="" id="nik" readonly="" type="text" value="3171234567890123"/>
</div>
<span class="font-body-sm text-[11px] text-outline">Format: 16-digits (Sesuai KTP terdaftar)</span>
</div>
<!-- Nama Pelapor (Pre-filled) -->
<div class="flex flex-col gap-1.5">
<label class="font-label-sm text-label-sm text-on-surface" for="nama">Nama Pelapor</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-on-surface-variant">
<span class="material-symbols-outlined">person</span>
</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-10 pr-4 py-3 font-body-md text-body-md text-on-surface-variant cursor-not-allowed outline-none focus:ring-0" disabled="" id="nama" readonly="" type="text" value="Budi Santoso"/>
</div>
</div>
<hr class="border-outline-variant/40 my-1"/>
<!-- Kategori Laporan -->
<div class="flex flex-col gap-1.5">
<label class="font-label-sm text-label-sm text-on-surface" for="kategori">Pilih Kategori <span class="text-error">*</span></label>
<div class="relative">
<select class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface appearance-none focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all cursor-pointer" id="kategori" required="">
<option disabled="" selected="" value="">Pilih kategori yang paling sesuai...</option>
<option value="jalan">Jalan Rusak</option>
<option value="sampah">Penumpukan Sampah</option>
<option value="lampu">Lampu Jalan Mati</option>
<option value="fasilitas">Fasilitas Publik</option>
<option value="lainnya">Lainnya</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Deskripsi Laporan -->
<div class="flex flex-col gap-1.5">
<label class="font-label-sm text-label-sm text-on-surface" for="deskripsi">Deskripsi Laporan <span class="text-error">*</span></label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all resize-y min-h-[100px]" id="deskripsi" placeholder="Ceritakan detail kronologi, lokasi spesifik, atau kondisi yang terjadi secara jelas..." required="" rows="4"></textarea>
<div class="flex justify-between items-center mt-1">
<span class="font-body-sm text-[11px] text-outline">Minimal 20 karakter.</span>
<span class="font-body-sm text-[11px] text-outline">0/500</span>
</div>
</div>
</form>
</div>
</main>
<!-- Footer Action (Sticky on mobile, embedded on desktop relative) -->
<div class="fixed md:static bottom-0 left-0 w-full bg-surface md:bg-transparent border-t md:border-t-0 border-outline-variant/30 p-margin-mobile md:p-0 md:mt-4 md:mb-8 z-40">
<div class="max-w-2xl mx-auto flex">
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-label-md text-label-md py-3.5 px-6 rounded-full shadow-md flex items-center justify-center gap-2 transition-all active:scale-[0.98]" type="button">
<span>Lanjut ke Foto &amp; Lokasi</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</div>
</body></html>
